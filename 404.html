<!DOCTYPE html>
<html lang="en-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Page not found on Alex Lee's personal site." />
    <meta name="robots" content="noindex" />
    <title>Page Not Found - Alex Lee</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="shortcut icon" href="/favicon_pika.ico" type="image/x-icon" />
  </head>
  <body class="not-found-page">
    <main class="not-found-shell">
      <section class="window not-found-window active" aria-label="Page not found">
        <div class="window-titlebar">
          <div class="traffic-lights">
            <span class="traffic close"></span>
            <span class="traffic minimize"></span>
            <span class="traffic zoom"></span>
          </div>
          <div class="window-title">404</div>
        </div>
        <div class="window-body not-found-body">
          <span class="file-icon file-icon-text">?</span>
          <div>
            <p class="kicker">Page not found</p>
            <h1>This window is missing.</h1>
            <p>The page you opened is not on this desktop anymore.</p>
            <a class="primary-action" href="/">Back to Alex Lee</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
